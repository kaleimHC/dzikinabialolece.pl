name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: dziki_test
          POSTGRES_USER: dziki
          POSTGRES_PASSWORD: dziki_dev_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis-broker:
        image: redis:7-alpine
        ports: ['6380:6379']
      redis-cache:
        image: redis:7-alpine
        ports: ['6381:6379']

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DB_NAME: dziki_test
      DB_USER: dziki
      DB_PASSWORD: dziki_dev_password
      DB_HOST: localhost
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6380/0
      REDIS_CACHE_URL: redis://localhost:6381/0
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run smoke tests
        # src/pytest.ini is found automatically (pytest searches up from test file).
        # --reuse-db: creates dziki_db fresh in CI (doesn't exist yet), runs migrations.
        # Local Docker: same config, but dziki_db already exists → reuses it.
        run: PYTHONPATH=src pytest src/tests/test_smoke.py -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend
