name: CI

on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgis/postgis:15-3.3
        env:
          POSTGRES_DB: dziki_test
          POSTGRES_USER: dziki
          POSTGRES_PASSWORD: dziki_dev_password
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis-broker:
        image: redis:7-alpine
        ports: ['6380:6379']
      redis-cache:
        image: redis:7-alpine
        ports: ['6381:6379']

    env:
      SECRET_KEY: ci-test-secret-key-not-for-production
      DEBUG: "True"
      DB_NAME: dziki_test
      DB_USER: dziki
      DB_PASSWORD: dziki_dev_password
      DB_HOST: localhost
      DB_PORT: "5432"
      CELERY_BROKER_URL: redis://localhost:6380/0
      REDIS_CACHE_URL: redis://localhost:6381/0
      ALLOWED_HOSTS: "localhost,127.0.0.1"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-test.txt

      - name: Run smoke tests
        # src/pytest.ini is found automatically (pytest searches up from test file).
        # --reuse-db: creates dziki_db fresh in CI (doesn't exist yet), runs migrations.
        # Local Docker: same config, but dziki_db already exists → reuses it.
        run: PYTHONPATH=src pytest src/tests/test_smoke.py -v --tb=short

      - name: Security regression tests
        run: cd src && python -m pytest tests/test_security_regression.py -v --tb=short

      - name: Bandit SAST (advisory)
        run: |
          pip install bandit[toml]
          bandit -r src/ -ll -x src/analytics/tests,src/tests --format json -o bandit-report.json || true
          python3 -c "
          import json, sys
          r = json.load(open('bandit-report.json'))
          highs = [i for i in r['results'] if i['issue_severity'] == 'HIGH']
          if highs:
              print(f'[advisory] {len(highs)} HIGH severity finding(s) from bandit:')
              for h in highs:
                  print(f\"  {h['filename']}:{h['line_number']} — {h['test_id']} {h['issue_text']}\")
          else:
              print('[advisory] bandit: no HIGH severity issues found')
          "

  security-python:
    name: Python security scan
    runs-on: ubuntu-latest
    needs: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install security tools
        run: pip install bandit[toml] safety

      - name: Bandit SAST
        run: bandit -r src/ -ll -x src/analytics/tests,src/tests --format json -o bandit-report.json || true

      - name: Parse bandit results
        run: |
          HIGHS=$(python3 -c "import json; r=json.load(open('bandit-report.json')); print(sum(1 for i in r['results'] if i['issue_severity']=='HIGH'))")
          echo "High severity issues: $HIGHS"
          [ "$HIGHS" -eq 0 ] || (cat bandit-report.json && exit 1)

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

      - name: Safety dependency check
        run: safety check --json || echo "Safety check advisory (non-blocking)"

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Run tests
        run: npm test
        working-directory: frontend
