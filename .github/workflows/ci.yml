name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ---------------------------------------------------------------------------
  # Backend: Django + PostGIS - migrate from zero, run pytest, ruff (pyflakes).
  # ---------------------------------------------------------------------------
  backend:
    name: Backend (Django + PostGIS)
    runs-on: ubuntu-latest

    services:
      postgis:
        image: postgis/postgis:15-3.4
        env:
          POSTGRES_DB: dziki_db
          POSTGRES_USER: dziki
          POSTGRES_PASSWORD: dziki_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U dziki -d dziki_db"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # DB - point Django straight at the postgis service (no PgBouncer in CI).
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: dziki_test_password
      DB_HOST: localhost
      DB_PORT: 5432
      # Non-default secrets so the production guards in settings.py /
      # serializers.py do not raise ImproperlyConfigured (DEBUG stays off).
      SECRET_KEY: ci-test-secret-key-not-for-production
      IP_HASH_SECRET: ci-test-ip-hash-secret
      DEBUG: "False"
      # Run Celery tasks synchronously / in-memory so tests don't need a worker.
      CELERY_BROKER_URL: memory://
      DJANGO_SETTINGS_MODULE: dziki.test_settings

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install GeoDjango system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            gdal-bin libgdal-dev binutils libproj-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt
          pip install ruff

      - name: Ruff (pyflakes ruleset)
        run: ruff check src/

      - name: Migrate from zero
        # A fresh DB + full migrate verifies the migration chain stands up
        # from scratch (catches broken/missing migrations).
        working-directory: src
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: src
        run: python -m pytest -v

  # ---------------------------------------------------------------------------
  # Frontend: build + unit tests + lint.
  # ---------------------------------------------------------------------------
  frontend:
    name: Frontend (React + Vite)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm run test
