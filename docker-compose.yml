# =============================================================================
# Docker Compose – Dziki na Białołęce
# MASTER_SPEC v2.2 Architecture
# =============================================================================

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: dziki-db
    environment:
      POSTGRES_DB: dziki_db
      POSTGRES_USER: dziki
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres/01-init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./config/postgres/02-fix-hba.sh:/docker-entrypoint-initdb.d/02-fix-hba.sh:ro
    networks:
      - dziki-internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dziki -d dziki_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: dziki-pgbouncer
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./config/pgbouncer/pgbouncer.ini:/etc/pgbouncer/pgbouncer.ini:ro
      - ./config/pgbouncer/userlist.txt:/etc/pgbouncer/userlist.txt:ro
    networks:
      - dziki-internal
      - dziki-app
    ports:
      - "127.0.0.1:6432:6432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 6432 -U dziki"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis-broker:
    image: redis:7-alpine
    container_name: dziki-redis-broker
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_password}
      --maxmemory-policy noeviction
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redis_broker_data:/data
    networks:
      - dziki-app
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  redis-cache:
    image: redis:7-alpine
    container_name: dziki-redis-cache
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_dev_password}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    networks:
      - dziki-app
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_dev_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        APP_UID: 1000
        APP_GID: 1000
    image: dziki-api:latest
    container_name: dziki-api
    # Run as appuser (uid 1000); supplemental group 988 = host docker GID
    # grants docker.sock access without requiring root.
    user: "1000:1000"
    group_add:
      - "988"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DJANGO_SETTINGS_MODULE: dziki.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DEBUG: ${DEBUG:-False}
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,api}
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-cache:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/0
      REDIS_CHANNELS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/1
      TZ: Europe/Warsaw
      SECRET_ADMIN_URL: ${SECRET_ADMIN_URL:-secret}
      IP_HASH_SECRET: ${IP_HASH_SECRET:-dev-ip-hash-secret-change-in-production}
      # DEV ONLY: Enable docker access for Bayesian pipeline
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_API_VERSION: "1.44"
      # Host path for Docker SDK volume mounts (mode_router.py)
      HOST_PROJECT_PATH: ${HOST_PROJECT_PATH:-/opt/dziki}
      QA_SESSION: ${QA_SESSION:-0}
    volumes:
      - ./src:/app:ro
      - ./fixtures:/fixtures:ro
      # DEV ONLY: Docker socket for Bayesian MCMC execution
      - /var/run/docker.sock:/var/run/docker.sock  # R pipeline execution only — scope: container run+wait
      # Shared R data volume (W matrix, RDS files)
      - r_data:/r_data:ro
    networks:
      - dziki-app
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    command: >
      daphne
      -b 0.0.0.0
      -p 8000
      --access-log -
      dziki.asgi:application

  worker-py:
    security_opt:
      - no-new-privileges:true
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        APP_UID: 1000
        APP_GID: 1000
    image: dziki-api:latest
    container_name: dziki-worker-py
    # Run as appuser (uid 1000); supplemental group 988 = host docker GID
    # grants docker.sock access without requiring root.
    user: "1000:1000"
    group_add:
      - "988"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DJANGO_SETTINGS_MODULE: dziki.settings
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key-change-in-production}
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      REDIS_CACHE_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-cache:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/0
      REDIS_CHANNELS_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/1
      TZ: Europe/Warsaw
      # DEV ONLY: Enable docker access for R pipeline
      DOCKER_HOST: unix:///var/run/docker.sock
      DOCKER_API_VERSION: "1.44"
      # Host path for Docker SDK volume mounts (mode_router.py)
      HOST_PROJECT_PATH: ${HOST_PROJECT_PATH:-/opt/dziki}
    volumes:
      - ./src:/app:ro
      - ./fixtures:/fixtures:ro
      # DEV ONLY: Docker socket for R pipeline execution
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - dziki-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "grep -q celery /proc/1/cmdline"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 60s
    command: >
      celery -A dziki worker
      -Q q_cpu,q_io
      --pool=prefork
      --concurrency=4
      --max-tasks-per-child=100
      --loglevel=INFO

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile.api
      args:
        APP_UID: 1000
        APP_GID: 1000
    image: dziki-api:latest
    container_name: dziki-celery-beat
    user: "1000:1000"
    depends_on:
      pgbouncer:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    environment:
      PYTHONPATH: /app
      DJANGO_SETTINGS_MODULE: dziki.settings
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
      DB_HOST: pgbouncer
      DB_PORT: "6432"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/0
      TZ: Europe/Warsaw
    volumes:
      - ./src:/app:ro
    networks:
      - dziki-app
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "from celery import Celery; c = Celery('dziki'); c.config_from_object('django.conf:settings', namespace='CELERY'); c.control.ping(timeout=5)"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    security_opt:
      - no-new-privileges:true
    command: >
      celery -A dziki beat
      --scheduler django_celery_beat.schedulers:DatabaseScheduler
      --loglevel=INFO

  worker-r:
    build:
      context: .
      dockerfile: Dockerfile.r
    image: dziki-worker-r:latest
    container_name: dziki-worker-r
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
      DB_HOST: db
      DB_PORT: "5432"
      OMP_NUM_THREADS: "1"
      TZ: Europe/Warsaw
    volumes:
      - ./r_scripts:/app/r_scripts:ro
      - r_data:/app/data
    networks:
      - dziki-internal
      - dziki-app
    restart: "no"
    security_opt:
      - no-new-privileges:true
    profiles:
      - r-tasks

  # =============================================================================
  # Worker-Bayes: Bayesian MCMC Worker (MASTER_SPEC v2.3)
  # ADR-014: Dedicated worker for computationally intensive Bayesian tasks
  # - Memory limit: 8GB (MCMC is memory-intensive)
  # - Concurrency: 1 (single task at a time)
  # - Queue: q_bayes (OP-B02, OP-B03)
  # =============================================================================
  worker-bayes:
    build:
      context: .
      dockerfile: Dockerfile.rstan-spatial
    image: dziki-worker-bayes:latest
    container_name: dziki-worker-bayes
    depends_on:
      db:
        condition: service_healthy
      redis-broker:
        condition: service_healthy
    environment:
      DB_NAME: dziki_db
      DB_USER: dziki
      DB_PASSWORD: ${DB_PASSWORD:-dziki_dev_password}
      DB_HOST: db
      DB_PORT: "5432"
      OMP_NUM_THREADS: "1"
      STAN_NUM_THREADS: "1"
      R_MAX_VSIZE: "8Gb"
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redis_dev_password}@redis-broker:6379/0
      TZ: Europe/Warsaw
    volumes:
      - ./r_scripts:/app/r_scripts:ro
      - r_data:/app/data
      - mcmc_data:/data/mcmc
    networks:
      - dziki-internal
      - dziki-app
    deploy:
      resources:
        limits:
          memory: 8G
        reservations:
          memory: 4G
    restart: "no"
    security_opt:
      - no-new-privileges:true
    profiles:
      - bayes-tasks

  frontend:
    image: node:20-alpine
    container_name: dziki-frontend
    # node:20-alpine ships a built-in 'node' user at uid/gid 1000
    user: "1000:1000"
    working_dir: /app
    environment:
      - NODE_ENV=development
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "127.0.0.1:5173:5173"
    networks:
      - dziki-app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

networks:
  dziki-internal:
    driver: bridge
    internal: true
  dziki-app:
    driver: bridge

volumes:
  postgres_data:
  redis_broker_data:
  r_data:
  mcmc_data:  # MCMC posterior draws storage (ADR-013)
