;; ==========================================================
;; PgBouncer Configuration - Dziki na Białołęce
;; ==========================================================
;; Dual-pool: transaction (API) + session (R workers)
;; Single container, two database aliases
;; ==========================================================

[databases]
;; Pool dla Django API i Celery-Python (krótkie zapytania)
;; Connection: postgresql://dziki:pass@pgbouncer:6432/dziki_db
dziki_db = host=db port=5432 dbname=dziki_db pool_mode=transaction

;; Pool dla Celery-R workers (długie zapytania GWR do 30+ min)
;; Connection: postgresql://dziki:pass@pgbouncer:6432/dziki_gwr
dziki_gwr = host=db port=5432 dbname=dziki_db pool_mode=session

[pgbouncer]
;; Network
listen_addr = 0.0.0.0
listen_port = 6432

;; Authentication
auth_type = plain
auth_file = /etc/pgbouncer/userlist.txt

;; Pool sizing
;; API (transaction): wysokie wykorzystanie, szybka rotacja
;; R workers (session): niskie wykorzystanie, długie sesje
default_pool_size = 20
min_pool_size = 5
reserve_pool_size = 5
max_client_conn = 400
max_db_connections = 80

;; ==========================================================
;; KRYTYCZNE DLA R WORKERS (GWR do 30+ min, hard limit 120 min)
;; ==========================================================
;; query_timeout=0 - bez limitu na zapytanie SQL
;; server_idle_timeout=0 - nie zamykaj idle connections
;; Te ustawienia są globalne, ale session pool i tak trzyma połączenie
query_timeout = 0
server_idle_timeout = 0
client_idle_timeout = 0

;; server_lifetime >= hard timeout Celery-R (120 min); 7200 = 2h
;; Poprzednio: 3600 (1h) - za krótkie dla długich sesji R
;; Teraz: 7200 (2h)
server_lifetime = 7200

;; Logging
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60

;; Admin console
admin_users = dziki
stats_users = dziki

;; TCP keepalive (zapobiega firewall drops dla długich sesji R)
tcp_keepalive = 1
tcp_keepidle = 60
tcp_keepintvl = 10
tcp_keepcnt = 6

;; Ignore startup parameters that break pooling
ignore_startup_parameters = extra_float_digits
